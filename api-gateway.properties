spring.application.name=api-gateway

server.port=9090

spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Product Service
spring.cloud.gateway.mvc.routes[0].id=product-service
spring.cloud.gateway.mvc.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/products/**

# User Service
spring.cloud.gateway.mvc.routes[1].id=user-service
spring.cloud.gateway.mvc.routes[1].uri=lb://USER-SERVICE
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/users/**

# Cart Service
spring.cloud.gateway.mvc.routes[2].id=cart-service
spring.cloud.gateway.mvc.routes[2].uri=lb://CART-SERVICE
spring.cloud.gateway.mvc.routes[2].predicates[0]=Path=/cart/**

# Order Service
spring.cloud.gateway.mvc.routes[3].id=order-service
spring.cloud.gateway.mvc.routes[3].uri=lb://ORDER-SERVICE
spring.cloud.gateway.mvc.routes[3].predicates[0]=Path=/orders/**

# Payment Service
spring.cloud.gateway.mvc.routes[4].id=payment-service
spring.cloud.gateway.mvc.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.mvc.routes[4].predicates[0]=Path=/payments/**

management.endpoints.web.exposure.include=*
logging.level.org.springframework.cloud.gateway=TRACE
